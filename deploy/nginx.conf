# AutoInsight Nginx config snippet
# Add this location block inside your existing server block for insight.hechenyu.xin
#
# IMPORTANT: this is a SNIPPET, not a full config.
# Insert it into your existing nginx site config, don't replace the whole thing.

location /auto {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Static files cache
location /auto/static {
    proxy_pass http://127.0.0.1:8081;
    proxy_cache_valid 200 1h;
    add_header Cache-Control "public, max-age=3600";
}
