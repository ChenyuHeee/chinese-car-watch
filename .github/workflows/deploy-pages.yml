name: Deploy Dashboard to GitHub Pages

on:
  push:
    paths:
      - "charts/summary-*.json"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy latest data to docs/
        run: |
          cp charts/summary-202605.json docs/latest.json
          # Also copy the latest report as markdown
          cp charts/report-202605.md docs/latest-report.md

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deployment
        uses: actions/deploy-pages@v4
