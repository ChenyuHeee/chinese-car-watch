services:
  web:
    build: .
    container_name: autoinsight
    ports:
      - "8081:8000"
    volumes:
      - ./data:/app/data           # persist SQLite
      - ./.env:/app/.env:ro        # API keys
    restart: unless-stopped
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/auto/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
